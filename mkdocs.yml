site_name: Privacy Agent
site_description: PII detection service documentation
site_url: https://mitchelllisle.github.io/privacy-agent/
repo_url: https://github.com/mitchelllisle/privacy-agent
repo_name: mitchelllisle/privacy-agent
theme:
  name: shadcn
  topbar_sections: true
  show_datetime: false
  accent: "oklch(64.5% 0.21 190)"
  pygments_style:
    light: shadcn-light
    dark: github-dark
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: true
            separate_signature: true
            docstring_style: google
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - API Reference: api.md
