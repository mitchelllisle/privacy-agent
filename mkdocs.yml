site_name: Privacy Agent
site_description: PII detection service documentation
repo_url: https://github.com/mitchelllisle/privacy-agent
theme:
  name: material
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: true
            separate_signature: true
            docstring_style: google
markdown_extensions:
  - admonition
  - pymdownx.snippets:
      check_paths: true
nav:
  - Home: index.md
  - API: api.md
